---
name: CI

'on':
    pull_request:
        branches:
            - main
        types:
            - opened
            - synchronize
            - reopened

permissions:
    contents: read

jobs:
    release:
        name: Release
        runs-on: ubuntu-24.04

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  ref: ${{ github.event.pull_request.head.sha }}

            - name: Configure Release
              run: cmake --preset release -B build/release

            - name: Build Release
              run: cmake --build build/release --parallel

            - name: Static analysis (clang-tidy)
              run: python3 scripts/clang_tidy.py --build-dir build/release

            - name: Unit test
              id: unit_test
              run: |
                  mkdir -p build/release/test-results
                  ctest \
                      --test-dir build/release \
                      --output-on-failure \
                      --output-junit \
                      "$GITHUB_WORKSPACE/build/release/test-results/junit.xml"

            - name: Upload unit test report
              if: ${{ !cancelled() && steps.unit_test.outcome != 'skipped' }}
              uses: actions/upload-artifact@v7
              with:
                  name: unit-test-results
                  path: build/release/test-results/junit.xml
                  if-no-files-found: error

            - name: Upload Release binaries
              uses: actions/upload-artifact@v7
              with:
                  name: release-binaries
                  path: build/release/src/libmj_sdk.so
                  if-no-files-found: error

            - name: Upload Release build metadata
              uses: actions/upload-artifact@v7
              with:
                  name: release-build-metadata
                  path: build/release/compile_commands.json
                  if-no-files-found: error

            - name: Integration test
              run: echo "Integration test placeholder"

            - name: Requirement test
              run: echo "Requirement test placeholder"

    coverage:
        name: Coverage
        runs-on: ubuntu-24.04

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  ref: ${{ github.event.pull_request.head.sha }}

            - name: Configure Coverage
              run: cmake --preset coverage -B build/coverage

            - name: Build Coverage
              run: cmake --build build/coverage --parallel

            - name: Clean coverage profiles
              run: |
                  mkdir -p build/coverage/profiles
                  find build/coverage -type f -name '*.profraw' -delete

            - name: Run coverage tests
              env:
                  LLVM_PROFILE_FILE: >-
                      ${{ github.workspace }}/build/coverage/profiles/%p.profraw
              run: ctest --test-dir build/coverage --output-on-failure

            - name: Generate coverage report
              run: bash scripts/generate_coverage_report.sh build/coverage

            - name: Upload coverage report
              uses: actions/upload-artifact@v7
              with:
                  name: coverage-report
                  path: build/coverage/coverage
                  if-no-files-found: error
